services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"   # or "127.0.0.1:11435:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 30        # ~5 minutes total
      start_period: 60s  
  presidio-anonymizer:
    image: presidio-anonymizer:latest
    build:
      context: ./presidio-anonymizer
    environment:
      - PORT=5001
    ports:
      - "5001:5001"

  presidio-analyzer:
    image: presidio-analyzer:latest
    build:
      context: ./presidio-analyzer
    environment:
      - PORT=5001
      - OLLAMA_HOST=http://ollama:11434
    ports:
      - "5002:5001"
    depends_on:
      ollama:
        condition: service_healthy

  presidio-image-redactor:
    image: presidio-image-redactor:latest
    build:
      context: ./presidio-image-redactor
    environment:
      - PORT=5001
    ports:
      - "5003:5001"

volumes:
  ollama-data:
