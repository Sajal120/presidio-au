supported_languages:
  - en
global_regex_flags: 26

recognizers:
  # Recognizers listed here can either be loaded from the recognizers defined in code (type: predefined),
  # or created based on the provided configuration (type: custom).
  # For predefined:
  # - If only a recognizer name is provided, a predefined recognizer with this name and default parameters will be loaded.
  # - If a parameter isn't provided, the default one would be loaded.
  # - Use 'class_name' to specify the Python class when using a custom 'name' for display/metadata
  # For custom:
  # - See an example configuration here: https://github.com/microsoft/presidio/blob/main/presidio-analyzer/presidio_analyzer/conf/example_recognizers.yaml
  # - Custom pattern recognizers with this configuration can be added to this file, with type: custom
  #  For recognizers supporting more than one language, an instance of the recognizer for each language will be created.
  # For example, see the CreditCardRecognizer definition below:
  - name: CreditCardRecognizer
    supported_languages:
      - language: en
        context:
          [
            credit,
            card,
            visa,
            mastercard,
            cc,
            amex,
            discover,
            jcb,
            diners,
            maestro,
            instapayment,
          ]
    type: predefined

  # Australian PII Recognizers - ENABLED
  - name: AuAbnRecognizer
    supported_languages:
      - en
    type: predefined

  - name: AuAcnRecognizer
    supported_languages:
      - en
    type: predefined

  - name: AuTfnRecognizer
    supported_languages:
      - en
    type: predefined

  - name: AuMedicareRecognizer
    supported_languages:
      - en
    type: predefined

  - name: AuBsbRecognizer
    supported_languages:
      - en
    type: predefined

  - name: AuPolicyRecognizer
    supported_languages:
      - en
    type: predefined

  - name: AuAccountRecognizer
    supported_languages:
      - en
    type: predefined

  - name: HuggingFaceNerRecognizer
    supported_languages:
      - en
    type: predefined
    enabled: false

  - name: CryptoRecognizer
    type: predefined

  - name: DateRecognizer
    type: predefined

  - name: EmailRecognizer
    type: predefined

  - name: IbanRecognizer
    type: predefined

  - name: IpRecognizer
    type: predefined

  - name: MacAddressRecognizer
    type: predefined

  - name: PhoneRecognizer
    type: predefined

  - name: UrlRecognizer
    type: predefined
